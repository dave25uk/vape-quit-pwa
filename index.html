<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vape/Quit Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <header>
        <h1 id="app-title">Vape Tracker</h1>
        <button id="mode-toggle">Switch to Quit Mode</button>
    </header>

    <main id="app-content">
        <section id="insights-bar">
            <div class="insight-item">Work (M) Avg: <strong id="avg-m">0mg</strong></div>
            <div class="insight-item">Work (A) Avg: <strong id="avg-a">0mg</strong></div>
            <div class="insight-item">Off-Day Avg: <strong id="avg-off">0mg</strong></div>
			<div class="insight-item">Overall Daily Avg: <strong id="avg-daily">0mg</strong></div>
        </section>

        <section id="calendar-container">
            <h3>Usage Calendar</h3>
            <div id="calendar-grid"></div>
        </section>

        <section id="entry-section">
            <form id="vape-form">
                <input type="number" id="ml" placeholder="Quantity (ml)" step="any" required>
                <input type="number" id="mg" placeholder="Strength (mg)" step="any" required>
                <input type="number" id="cost" placeholder="Cost (£)" step="any" required>
                
                <label for="start-date">Started at:</label>
                <input type="datetime-local" id="start-date" required>
                
                <button type="submit">Log New Vape</button>
            </form>
        </section>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
