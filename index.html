<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vape/Quit Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <header>
        <h1 id="app-title">Vape Tracker <span id="status-emoji"></span></h1>
        <button id="mode-toggle">Switch to Quit Mode</button>
    </header>

    <main id="app-content">
        <section id="insights-bar">
            <div class="insight-item">Work (M) Avg: <strong id="avg-m">0mg</strong></div>
            <div class="insight-item">Work (A) Avg: <strong id="avg-a">0mg</strong></div>
            <div class="insight-item">Off-Day Avg: <strong id="avg-off">0mg</strong></div>
			<div class="insight-item">Overall Daily Avg: <strong id="avg-daily">0mg</strong></div>
        </section>

        <section id="calendar-container">
    <div class="calendar-header">
    <button id="edit-lock-btn" title="Toggle Edit Mode">🔓</button>
    <div class="nav-group">
        <button id="prev-month">&lt;</button>
        <h3 id="current-month-display">Month Year</h3>
        <button id="next-month">&gt;</button>
    </div>
</div>
    
    <div class="weekday-header">
        <div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div>
    </div>
    
    <div id="calendar-grid"></div>
</section>

<section id="entry-section">
    <div id="vape-form-container">
        <form id="vape-form">
            <div class="input-grid">
                <input type="number" id="ml" placeholder="Qty (ml)" step="any">
                <input type="number" id="mg" placeholder="Str (mg)" step="any">
                <input type="number" id="cost" placeholder="Cost (£)" step="any">
                <input type="datetime-local" id="start-date">
            </div>
            <button type="submit" id="log-button">Log New Vape</button>
        </form>
    </div>

    <div id="nrt-form-container" style="display: none;">
        <div class="nrt-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: white; padding: 20px; border-radius: 12px;">
            <button id="log-patch" style="background: #059669;">Log Patch (21mg)</button>
            <button id="log-lozenge" style="background: #10b981;">Log Lozenge (2mg)</button>
        </div>
    </div>
</section>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
