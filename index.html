<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vape/Quit Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <header>
        <h1 id="app-title">Vape Tracker <span id="status-emoji"></span></h1>
        <button id="mode-toggle">Switch to Quit Mode</button>
    </header>

    <main id="app-content">
        <section id="insights-bar">
            <div class="insight-item">Work (M) Avg: <strong id="avg-m">0mg</strong></div>
            <div class="insight-item">Work (A) Avg: <strong id="avg-a">0mg</strong></div>
            <div class="insight-item">Off-Day Avg: <strong id="avg-off">0mg</strong></div>
			<div class="insight-item">Overall Daily Avg: <strong id="avg-daily">0mg</strong></div>
        </section>

        <section id="calendar-container">
    <div class="calendar-header">
    <button id="edit-lock-btn" title="Toggle Edit Mode">🔓</button>
    <div class="nav-group">
        <button id="prev-month">&lt;</button>
        <h3 id="current-month-display">Month Year</h3>
        <button id="next-month">&gt;</button>
    </div>
</div>
    
    <div class="weekday-header">
        <div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div>
    </div>
    
    <div id="calendar-grid"></div>
	
</section>

<section id="entry-section">
    <div id="vape-form-container">
        <form id="vape-form">
            <div class="input-grid">
                <input type="number" id="ml" placeholder="Qty (ml)" step="any">
                <input type="number" id="mg" placeholder="Str (mg)" step="any">
                <input type="number" id="cost" placeholder="Cost (£)" step="any">
                <input type="datetime-local" id="start-date">
            </div>
            <button type="submit" id="log-button">Log New Vape</button>
        </form>
    </div>

<div id="nrt-form-container" style="display: none;">
    <div class="nrt-grid" style="display: grid; grid-template-columns: 1fr; gap: 12px; background: white; padding: 20px; border-radius: 12px;">
        
        <div style="display: flex; gap: 8px;">
            <select id="patch-strength" style="flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 14px;">
                <option value="25">25mg Patch</option>
                <option value="15">15mg Patch</option>
                <option value="10">10mg Patch</option>
            </select>
            <button id="log-patch" style="flex: 1; background: #059669; margin: 0; width: auto;">Log Patch</button>
        </div>

        <div style="height: 1px; background: #eee; margin: 5px 0;"></div>

        <button id="log-lozenge" style="background: #10b981; margin: 0;">Log 2mg Lozenge</button>
    </div>
</div>
<details id="history-drawer" style="margin-top: 30px; border: 1px solid #e5e7eb; border-radius: 12px; background: #fff;">
    <summary style="padding: 15px; cursor: pointer; font-weight: 600; color: #374151; list-style: none; display: flex; justify-content: space-between; align-items: center;">
        <span>📜 View Recent Entry History</span>
        <span style="font-size: 0.8rem; color: #6b7280;">(Tap to expand/hide)</span>
    </summary>
    
    <div style="padding: 0 15px 15px 15px; border-top: 1px solid #f3f4f6;">
        <p style="font-size: 0.85rem; color: #666; margin-bottom: 15px;">Entries are shown with the most recent first.</p>
        <div id="history-list" style="max-height: 400px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px;">
            </div>
    </div>
</details>
</section>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
